<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة تحكم المدير — الدراسات الخمسة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal','Cairo',sans-serif;background:#f0f4f4;min-height:100vh}
/* HEADER */
.hdr{background:linear-gradient(135deg,#041a1a,#0a3535)}
.hi{max-width:1200px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:13px}
.hl{height:50px;background:#fff;border-radius:9px;padding:5px 9px}
.hs{width:1px;height:38px;background:rgba(201,162,39,.3)}
.ht h1{font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;color:#fff}
.ht p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.hb{margin-right:auto;background:rgba(201,162,39,.12);border:1px solid rgba(201,162,39,.3);border-radius:20px;padding:4px 13px;font-size:11px;color:#e8c050;font-weight:700}
/* LOGIN */
#loginWrap{max-width:360px;margin:70px auto;background:#fff;border-radius:14px;padding:30px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
#loginWrap img{height:56px;margin-bottom:13px}
#loginWrap h2{font-family:'Cairo',sans-serif;font-size:17px;font-weight:800;color:#085f5f;margin-bottom:4px}
#loginWrap p{font-size:13px;color:#666;margin-bottom:15px}
#pw{width:100%;padding:11px;border:2px solid #dde;border-radius:7px;font-size:15px;outline:none;direction:ltr;text-align:center;letter-spacing:4px;margin-bottom:9px;font-family:monospace;transition:border .2s}
#pw:focus{border-color:#0d7a7a}
#lbtn{width:100%;background:linear-gradient(135deg,#0d7a7a,#085f5f);color:#fff;border:none;border-radius:7px;padding:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
#lbtn:disabled{opacity:.6;cursor:not-allowed}
#lerr{color:#c03030;font-size:13px;margin-top:7px;min-height:18px}
/* ADMIN MAIN */
#adminWrap{display:none;max-width:1200px;margin:0 auto;padding:22px 14px 60px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:#fff;border-radius:10px;padding:13px 15px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.05);border-top:4px solid #0d7a7a}
.sc.go{border-top-color:#c9a227}.sc.gr{border-top-color:#1a9040}.sc.rd{border-top-color:#c03030}
.sn{font-family:'Cairo',sans-serif;font-size:24px;font-weight:900;color:#085f5f}
.go .sn{color:#a88020}.gr .sn{color:#1a7040}.rd .sn{color:#c03030}
.sl{font-size:11px;color:#888;margin-top:2px;font-weight:600}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid #dde;margin-bottom:16px}
.tab{background:none;border:none;padding:10px 18px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab:hover{color:#085f5f}.tab.on{color:#085f5f;border-bottom-color:#0d7a7a}
.btn-sm{background:#fff;border:1.5px solid #dde;border-radius:7px;padding:7px 12px;font-size:12px;color:#555;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:2px}
.btn-sm:hover{border-color:#0d7a7a;color:#0d7a7a}
/* CARDS */
.rl{display:flex;flex-direction:column;gap:8px}
.rc{background:#fff;border-radius:11px;padding:15px 17px;box-shadow:0 1px 5px rgba(0,0,0,.05);border-right:5px solid #dde}
.rc.pending{border-right-color:#c9a227}.rc.generated{border-right-color:#0d7a7a}.rc.rejected{border-right-color:#c03030}
.rct{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.rcn{font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;color:#1a1a1a}
.rcm{font-size:11px;color:#888;margin-top:2px}
.stb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sp{background:rgba(201,162,39,.15);color:#a88020;border:1px solid rgba(201,162,39,.3)}
.sg{background:rgba(13,122,122,.12);color:#085f5f;border:1px solid rgba(13,122,122,.25)}
.sr{background:rgba(192,48,48,.1);color:#c03030;border:1px solid rgba(192,48,48,.2)}
.rcd{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.di{background:#f7fafa;border-radius:5px;padding:5px 8px;font-size:12px}
.dl{color:#aaa;font-size:10px;margin-bottom:1px}.dv{color:#222;font-weight:600}
.rdesc{font-size:12px;color:#444;line-height:1.7;background:#fafcfc;border-radius:6px;padding:7px 10px;margin-bottom:8px;border-right:3px solid rgba(13,122,122,.15)}
.ra{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.ni{flex:1;min-width:150px;padding:7px 10px;border:1.5px solid #dde;border-radius:6px;font-family:'Tajawal',sans-serif;font-size:12px;outline:none;direction:rtl}
.ni:focus{border-color:#0d7a7a}
.bok{background:linear-gradient(135deg,#1a9040,#116030);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.bok:disabled{opacity:.5;cursor:not-allowed}
.bno{background:#fff;color:#c03030;border:1.5px solid #c03030;border-radius:7px;padding:8px 12px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.bvw{background:rgba(13,122,122,.1);color:#085f5f;border:1.5px solid rgba(13,122,122,.25);border-radius:7px;padding:8px 12px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
/* LOG */
.li{background:#fff;border-radius:9px;padding:11px 15px;margin-bottom:7px;box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:11px}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.lt{flex:1;font-size:12px;color:#333;line-height:1.6}
.ldt{color:#aaa;font-size:11px;white-space:nowrap}
/* OVERLAY */
#ov{display:none;position:fixed;inset:0;background:rgba(3,15,15,.9);z-index:998;flex-direction:column;align-items:center;justify-content:center;gap:13px}
#ov.on{display:flex}
.osp{width:52px;height:52px;border:3px solid rgba(13,122,122,.15);border-top-color:#0d7a7a;border-right-color:#c9a227;border-radius:50%;animation:sp 1.2s linear infinite}
.otx{color:#fff;font-size:15px;font-weight:600;font-family:'Cairo',sans-serif}
/* MODAL */
#repMod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;overflow-y:auto;padding:14px}
#repMod.on{display:block}
.mi{max-width:1100px;margin:0 auto;background:#0a1a1a;border-radius:13px;padding:18px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.mh h2{font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;color:#e8c050}
.ma{display:flex;gap:6px;flex-wrap:wrap}
.mc{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:6px 13px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer}
/* REPORT SLIDE CSS */
.bta{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);border-radius:8px;padding:7px 14px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.bta:hover{background:rgba(13,122,122,.25);border-color:rgba(13,122,122,.5);color:#fff}
.bta.gld{background:rgba(201,162,39,.1);border-color:rgba(201,162,39,.3);color:var(--gl)}
.bta.gld:hover{background:rgba(201,162,39,.22)}
.snav{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:18px}
.snbtn{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.slide{display:none;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 8px 32px rgba(13,122,122,.12);min-height:520px}
.slide.on{display:block}
.cv{background:linear-gradient(160deg,#0d5c5c 0%,#085050 40%,#052f2f 100%);min-height:600px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 40px;position:relative;overflow:hidden}
.cv::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a227' fill-opacity='0.045'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.cv-header{display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative;width:100%;max-width:700px}
.cv-logo-box{background:rgba(255,255,255,.95);border-radius:14px;padding:14px 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.3);flex-shrink:0}
.cv-hdr-div{width:1px;height:72px;background:rgba(201,162,39,.35);margin:0 22px}
.cv-univ-block{text-align:right;flex:1}
.cv-univ-ar{font-family:'Cairo',sans-serif;font-size:20px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:2px}
.cv-univ-en{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:2px;margin-bottom:8px}
.cv-dept1{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;margin-bottom:2px}
.cv-dept2{font-size:11px;color:rgba(255,255,255,.45)}
.cv-gold-sep{width:180px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 20px}
.cv-five-wrap{margin-bottom:18px}
.cv-five-badge{display:inline-block;border:1.5px solid rgba(201,162,39,.5);border-radius:6px;padding:8px 30px}
.cv-five-text{font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;color:var(--gl);letter-spacing:2px}
.cv-proj-name{font-family:'Cairo',sans-serif;font-size:clamp(17px,2.8vw,26px);font-weight:900;color:#fff;line-height:1.6;max-width:680px;margin:0 auto 14px;position:relative}
.cv-yr-line{font-size:13px;color:rgba(255,255,255,.4);font-weight:300;letter-spacing:1px}
.cv-bar{position:absolute;bottom:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--tl),var(--gold),var(--teal))}
.si{background:linear-gradient(145deg,#085f5f,#063535);min-height:520px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 36px;position:relative}
.si-logo{height:42px;position:absolute;top:20px;left:28px;opacity:.7}
.si-n{font-size:68px;font-weight:900;font-family:'Cairo',sans-serif;color:rgba(201,162,39,.1);line-height:1;margin-bottom:-6px}
.si h2{font-family:'Cairo',sans-serif;font-size:clamp(24px,4vw,42px);font-weight:900;color:var(--gl)}
.si-desc{font-size:13px;color:rgba(255,255,255,.4);margin-top:12px;text-align:center;max-width:400px;font-weight:300;line-height:1.8}
.si-kps{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.si-kp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,.6)}
.si-bot{position:absolute;bottom:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 7px,transparent 7px,transparent 14px);opacity:.4}
/* CONTENT SLIDE */
.cs-hdr{background:linear-gradient(135deg,var(--teal),#085f5f);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.cs-hdr-l{display:flex;align-items:center;gap:12px}
.cs-hdr-logo{height:34px;width:auto;opacity:.9}
.cs-hdr-dv{width:1px;height:26px;background:rgba(255,255,255,.2)}
.cs-hdr h3{font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;color:#fff}
.cs-bdg{background:rgba(201,162,39,.2);border:1px solid rgba(201,162,39,.4);border-radius:5px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--gl);white-space:nowrap}
.cs-body{padding:20px 26px;flex:1;color:#1a1a1a;direction:rtl;font-size:13px;line-height:1.75}
.cs-body h4{font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;color:#085f5f;border-right:3px solid var(--gold);padding-right:9px;margin:16px 0 8px}
.cs-body h4:first-child{margin-top:0}
.cs-body p{font-size:13px;line-height:1.8;color:#444;margin-bottom:8px}
.cs-body ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.cs-body ul li{font-size:12.5px;line-height:1.7;color:#555;display:flex;align-items:flex-start;gap:7px;padding:6px 11px;background:rgba(13,122,122,.04);border-radius:7px;border-right:2px solid rgba(13,122,122,.15)}
.cs-body ul li::before{content:'◈';color:var(--teal);font-size:9px;flex-shrink:0;margin-top:4px}
.cs-body .hbox{background:linear-gradient(135deg,rgba(13,122,122,.07),rgba(201,162,39,.04));border:1px solid rgba(13,122,122,.14);border-radius:9px;padding:12px 14px;margin:8px 0;font-size:12.5px;line-height:1.8;color:#222}
.cs-body .hbox.gld{background:linear-gradient(135deg,rgba(201,162,39,.08),rgba(13,122,122,.04));border-color:rgba(201,162,39,.2)}
.cs-body .tcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.cs-body .icard{background:linear-gradient(135deg,rgba(13,122,122,.06),rgba(201,162,39,.03));border:1px solid rgba(13,122,122,.12);border-radius:8px;padding:10px 12px}
.cs-body .icard .ct{font-size:10px;font-weight:700;color:#085f5f;margin-bottom:4px;text-transform:uppercase}
.cs-body .icard p{font-size:12px;margin:0}
.cs-body table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;border-radius:8px;overflow:hidden}
.cs-body th{background:var(--teal);color:#fff;padding:8px 11px;text-align:right;font-weight:700;font-size:11px}
.cs-body td{padding:7px 11px;border-bottom:1px solid rgba(0,0,0,.05);color:#333;vertical-align:top;line-height:1.6}
.cs-body tr:nth-child(even) td{background:rgba(13,122,122,.04)}
.cs-body tr:last-child td{border-bottom:none}
.rbad{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.rh{background:rgba(220,50,50,.1);color:#c03030;border:1px solid rgba(220,50,50,.2)}
.recbad{display:inline-flex;align-items:center;gap:3px;background:rgba(30,160,80,.1);color:#1a7040;border:1px solid rgba(30,160,80,.25);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700}
.tl-row{display:flex;gap:0;margin-bottom:6px;align-items:stretch}
.tl-mark{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--teal);border:2px solid var(--gold)}
.tl-line{width:2px;flex:1;background:rgba(13,122,122,.2);margin:2px 0}
.tl-box{background:rgba(13,122,122,.04);border:1px solid rgba(13,122,122,.1);border-radius:7px;padding:8px 11px;flex:1;margin-bottom:3px}
.tl-box .pt{font-size:12px;font-weight:700;color:#085f5f}
.tl-box .pm{font-size:11px;color:#888;margin-top:2px}
.tl-box .pd{font-size:11.5px;color:#555;margin-top:3px}
.cs-ftr{background:rgba(13,122,122,.04);border-top:1px solid rgba(13,122,122,.08);padding:6px 26px;display:flex;align-items:center;justify-content:space-between}
.cs-ftr span{font-size:10px;color:#888}
.cs-fbar{height:4px;background:linear-gradient(90deg,var(--teal),var(--gold))}
.sctrl{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.bnav{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);border-radius:8px;padding:8px 16px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.bnav:hover{background:rgba(13,122,122,.2);border-color:rgba(13,122,122,.4);color:#fff}
.bnav:disabled{opacity:.25;cursor:default}
.scnt{font-size:12px;color:rgba(255,255,255,.35)}
/* PRINT */
@media print{
  body{background:#fff}
  .hdr,.steps,.rtbar,.snav,.sctrl{display:none!important}
  #repSec{display:block!important}
  .slide{display:block!important;page-break-after:always;break-after:page;border-radius:0;box-shadow:none}
  .cv,.si{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .fgrid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .cs-body .tcols{grid-template-columns:1fr}
}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:680px){.stats{grid-template-columns:1fr 1fr}.rcd{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="hdr"><div class="hi">
  <img src="CLSRC" class="hl" alt="UQU">
  <div class="hs"></div>
  <div class="ht"><h1>لوحة تحكم المدير — الدراسات الخمسة</h1><p>جامعة أم القرى · وكالة الجامعة للمشاريع · قسم الدراسات والتصاميم</p></div>
  <div class="hb">🔐 مدير القسم</div>
</div></header>

<!-- LOGIN -->
<div id="loginWrap">
  <img src="CLSRC" alt="UQU">
  <h2>دخول لوحة التحكم</h2>
  <p>أدخل كلمة المرور وبيانات التخزين للدخول</p>
  <input type="password" id="pw" placeholder="● ● ● ● ● ●">
  <button id="lbtn">دخول ←</button>
  <div id="lerr"></div>
</div>

<!-- ADMIN -->
<div id="adminWrap">
  <div class="stats">
    <div class="sc go"><div class="sn" id="s1">0</div><div class="sl">قيد الانتظار</div></div>
    <div class="sc gr"><div class="sn" id="s2">0</div><div class="sl">تقارير مُولَّدة</div></div>
    <div class="sc"><div class="sn" id="s3">0</div><div class="sl">إجمالي الطلبات</div></div>
    <div class="sc rd"><div class="sn" id="s4">0</div><div class="sl">مرفوضة</div></div>
  </div>
  <div class="tabs">
    <button class="tab on" id="t1">⏳ الطلبات الجديدة</button>
    <button class="tab" id="t2">📁 المعالجة</button>
    <button class="tab" id="t3">📊 سجل الإنجاز</button>
    <button class="btn-sm" style="margin-right:auto" id="btnRef">🔄 تحديث</button>
    <button class="btn-sm" id="btnOut">خروج</button>
  </div>
  <div id="tp" class="rl"></div>
  <div id="td" class="rl" style="display:none"></div>
  <div id="tl" style="display:none"></div>
</div>

<div id="ov"><div class="osp"></div><div class="otx" id="otx">جاري المعالجة...</div></div>

<div id="repMod"><div class="mi">
  <div class="mh">
    <h2 id="mtt">التقرير</h2>
    <div class="ma">
      <button class="bta" id="btnEdit" data-mode="0" onclick="toggleEdit()">✏️ تعديل</button>
      <button class="bta" onclick="exportWord()">📄 وورد</button>
      <button class="bta gld" onclick="exportPDF()">🖨 PDF</button>
      <button class="mc" id="btnCR">✕ إغلاق</button>
    </div>
  </div>
  <div class="snav" id="snav"></div>
  <div id="slides"></div>
  <div class="sctrl">
    <button class="bnav" id="bPrev" onclick="movSlide(-1)">→ السابق</button>
    <span class="scnt" id="scnt">1/1</span>
    <button class="bnav" id="bNext" onclick="movSlide(1)">التالي ←</button>
  </div>
  <div id="rTitle" style="display:none"></div>
  <div id="rMeta" style="display:none"></div>
</div></div>

<script>
"use strict";
var WL='WLSRC';
var CL='CLSRC';
var cur=0,slides=[];

function sec(t,m){
  var i=t.indexOf(m);if(i===-1)return'—';
  var s=i+m.length,rest=t.substring(s);
  var e=rest.search(/\n[A-Z][A-Z_0-9]+:\n/);
  return(e===-1?rest:rest.substring(0,e)).trim();
}
function lns(t,m){
  return sec(t,m).split('\n').map(function(l){return l.replace(/^[-*•◈\d.)\s]+/,'').trim();}).filter(Boolean);
}

function mkSlides(){
  var c=document.getElementById('slides');c.innerHTML='';
  slides.forEach(function(s,i){
    var d=document.createElement('div');
    d.className='slide'+(i===0?' on':'');d.id='sl'+i;d.innerHTML=s.html;c.appendChild(d);
  });
  // Re-apply edit mode if active
  if(document.getElementById('btnEdit')&&document.getElementById('btnEdit').dataset.mode==='1'){
    document.querySelectorAll('.cs-body').forEach(function(el){
      el.contentEditable='true';el.style.outline='2px dashed rgba(201,162,39,.6)';
    });
  }
}
function mkNav(){
  var n=document.getElementById('snav');n.innerHTML='';
  slides.forEach(function(s,i){
    var b=document.createElement('button');
    b.className='snbtn'+(s.t==='sec'||s.t==='cover'?' sec':'')+(i===0?' on':'');
    b.textContent=s.lbl;b.onclick=(function(x){return function(){go(x);};})(i);n.appendChild(b);
  });
}
function go(n){
  document.querySelectorAll('.slide').forEach(function(e,i){e.classList.toggle('on',i===n);});
  document.querySelectorAll('.snbtn').forEach(function(e,i){e.classList.toggle('on',i===n);});
  cur=n;
  document.getElementById('scnt').textContent=(n+1)+' / '+slides.length;
  document.getElementById('bPrev').disabled=(n===0);
  document.getElementById('bNext').disabled=(n===slides.length-1);
  document.getElementById('slides').scrollIntoView({behavior:'smooth',block:'start'});
}
function movSlide(dir){var x=cur+dir;if(x>=0&&x<slides.length)go(x);}
function toggleEdit(){
  var editing = document.getElementById('btnEdit').dataset.mode==='0';
  document.querySelectorAll('.cs-body').forEach(function(el){
    el.contentEditable = editing ? 'true' : 'false';
    el.style.outline = editing ? '2px dashed rgba(201,162,39,.6)' : 'none';
    el.style.background = editing ? 'rgba(201,162,39,.03)' : '';
  });
  document.getElementById('btnEdit').dataset.mode = editing ? '1' : '0';
  document.getElementById('btnEdit').textContent = editing ? '✅ حفظ التعديلات' : '✏️ تعديل المحتوى';
}
function exportPDF(){
  document.querySelectorAll('.slide').forEach(function(s){s.style.display='block';});
  document.querySelector('.sctrl').style.display='none';
  document.getElementById('snav').style.display='none';
  document.querySelector('.rtbar').style.display='none';
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      document.querySelector('.sctrl').style.display='';
      document.getElementById('snav').style.display='';

function exportWord(){
  var btn=document.getElementById('btnWord');
  btn.disabled=true; btn.textContent='⏳ جاري التحضير...';
  try{
    // Collect all slide content
    var rows=[];
    slides.forEach(function(s,i){
      if(s.t==='cover'||s.t==='sec') return;
      var tmp=document.createElement('div');
      tmp.innerHTML=s.html;
      var hdr=tmp.querySelector('.cs-hdr h3');
      var body=tmp.querySelector('.cs-body');
      if(hdr&&body){
        rows.push({title:hdr.textContent, content:body.innerHTML});
      }
    });
    
    // Build a clean printable HTML document for Word
    var projName=document.getElementById('rTitle').textContent;
    var projMeta=document.getElementById('rMeta').textContent;
    
    var wordHTML='<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8">'+
      '<style>'+
      'body{font-family:Arial,sans-serif;direction:rtl;margin:2cm;font-size:11pt}'+
      'h1{font-size:16pt;color:#0d5c5c;border-bottom:2px solid #c9a227;padding-bottom:6px}'+
      'h2{font-size:13pt;color:#0d5c5c;margin-top:20px;border-right:4px solid #c9a227;padding-right:8px}'+
      'table{width:100%;border-collapse:collapse;margin:10px 0}'+
      'th{background:#0d5c5c;color:white;padding:6px 10px;text-align:right;font-size:10pt}'+
      'td{padding:5px 10px;border:1px solid #ddd;font-size:10pt;vertical-align:top}'+
      'tr:nth-child(even) td{background:#f5fafa}'+
      'ul{margin:8px 0;padding-right:20px}'+
      'li{margin:4px 0;font-size:10pt}'+
      '.hbox{background:#f0f8f8;border-right:3px solid #0d5c5c;padding:8px 12px;margin:8px 0;font-size:10pt}'+
      '.page-break{page-break-after:always}'+
      '</style></head><body>'+
      '<h1>تقرير الدراسات الخمسة</h1>'+
      '<p><strong>'+projName+'</strong><br>'+projMeta+'</p>';
    
    rows.forEach(function(r,i){
      // Clean HTML for Word
      var clean=r.content
        .replace(/class="hbox gld"/g,'class="hbox"')
        .replace(/class="rbad rh"/g,'style="color:red;font-weight:bold"')
        .replace(/class="rbad rm"/g,'style="color:orange;font-weight:bold"')
        .replace(/class="rbad rl"/g,'style="color:green;font-weight:bold"')
        .replace(/class="recbad"/g,'style="color:green;font-weight:bold"')
        .replace(/class="[^"]*"/g,'')
        .replace(/style="direction:ltr;/g,'style="');
      wordHTML+='<h2>'+r.title+'</h2>'+clean;
      if(i%4===3) wordHTML+='<div class="page-break"></div>';
    });
    wordHTML+='</body></html>';
    
    // Download as .doc (Word-compatible HTML)
    var blob=new Blob([wordHTML],{type:'application/msword;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='تقرير_الدراسات_الخمسة.doc';
    a.click(); URL.revokeObjectURL(url);
    btn.textContent='📄 تحميل وورد';
  }catch(e){alert('خطأ: '+e.message);}
  btn.disabled=false;
}
